<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00a8cc"/>
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c96e"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d7aff"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)"/>
  
  <!-- Logo Symbol Left -->
  <g transform="translate(80, 100)" filter="url(#glow)">
    <!-- Hexagon -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" 
             fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.8"/>
    
    <!-- E -->
    <g transform="translate(-30, -35)">
      <rect x="0" y="0" width="8" height="65" rx="2" fill="url(#cyanGrad)"/>
      <rect x="8" y="0" width="35" height="8" rx="2" fill="url(#cyanGrad)"/>
      <rect x="8" y="20" width="28" height="5" rx="1" fill="url(#cyanGrad)"/>
      <rect x="8" y="38" width="35" height="8" rx="2" fill="url(#cyanGrad)"/>
      <rect x="8" y="55" width="25" height="5" rx="1" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Building -->
    <g transform="translate(10, -28)">
      <rect x="0" y="18" width="28" height="42" rx="2" fill="url(#violetGrad)" opacity="0.9"/>
      <rect x="5" y="24" width="6" height="6" rx="1" fill="#050d1a" opacity="0.5"/>
      <rect x="15" y="24" width="6" height="6" rx="1" fill="#050d1a" opacity="0.5"/>
      <rect x="5" y="34" width="6" height="6" rx="1" fill="#050d1a" opacity="0.5"/>
      <rect x="15" y="34" width="6" height="6" rx="1" fill="#050d1a" opacity="0.5"/>
      <rect x="5" y="44" width="6" height="6" rx="1" fill="#00d4ff" opacity="0.3"/>
      <rect x="15" y="44" width="6" height="6" rx="1" fill="#00d4ff" opacity="0.3"/>
      <rect x="11" y="0" width="4" height="20" rx="1" fill="url(#goldGrad)"/>
      <circle cx="13" cy="0" r="3" fill="url(#cyanGrad)"/>
    </g>
  </g>
  
  <!-- Brand Text -->
  <g transform="translate(180, 115)">
    <text x="0" y="0" font-family="'Syne', sans-serif" font-size="42" font-weight="800" fill="#f4f6fa" letter-spacing="6">E-IMMO</text>
  </g>
  
  <g transform="translate(180, 145)">
    <text x="0" y="0" font-family="'DM Sans', sans-serif" font-size="16" font-weight="400" fill="#c9a84c" letter-spacing="10">BY ELECTRON</text>
  </g>
  
  <!-- Decorative line -->
  <line x1="180" y1="160" x2="400" y2="160" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.3"/>
  
  <!-- Tagline -->
  <text x="700" y="115" font-family="'DM Sans', sans-serif" font-size="11" fill="#8899bb" letter-spacing="3" text-anchor="end" text-transform="uppercase">Premium Real Estate</text>
  <text x="700" y="130" font-family="'DM Sans', sans-serif" font-size="11" fill="#8899bb" letter-spacing="3" text-anchor="end" text-transform="uppercase">Platform</text>
  
</svg>