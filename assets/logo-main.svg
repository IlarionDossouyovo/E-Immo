<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00a8cc"/>
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c96e"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d7aff"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00d4ff" stroke-width="0.5"/>
  </g>
  
  <!-- Main Logo Symbol: Stylized E + Building -->
  <g filter="url(#glow)" transform="translate(256, 256)">
    
    <!-- Outer hexagon (tech/building fusion) -->
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70" 
             fill="none" stroke="url(#cyanGrad)" stroke-width="3" opacity="0.6"/>
    
    <!-- Inner hexagon -->
    <polygon points="0,-100 86,-50 86,50 0,100 -86,50 -86,-50" 
             fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.4"/>
    
    <!-- Stylized E - Main letter -->
    <g transform="translate(-60, -80) scale(1)">
      <!-- E vertical bar -->
      <rect x="0" y="0" width="18" height="140" rx="4" fill="url(#cyanGrad)"/>
      
      <!-- E horizontal bars -->
      <rect x="18" y="0" width="80" height="18" rx="4" fill="url(#cyanGrad)"/>
      <rect x="18" y="42" width="65" height="14" rx="3" fill="url(#cyanGrad)"/>
      <rect x="18" y="84" width="80" height="18" rx="4" fill="url(#cyanGrad)"/>
      <rect x="18" y="122" width="55" height="14" rx="3" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Building/Tower element on right -->
    <g transform="translate(40, -60)">
      <!-- Tower base -->
      <rect x="0" y="40" width="50" height="80" rx="3" fill="url(#violetGrad)" opacity="0.9"/>
      
      <!-- Windows grid -->
      <rect x="8" y="50" width="12" height="12" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="28" y="50" width="12" height="12" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="8" y="70" width="12" height="12" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="28" y="70" width="12" height="12" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="8" y="90" width="12" height="12" rx="2" fill="#00d4ff" opacity="0.3"/>
      <rect x="28" y="90" width="12" height="12" rx="2" fill="#00d4ff" opacity="0.3"/>
      
      <!-- Antenna / Tech element -->
      <rect x="20" y="0" width="8" height="45" rx="2" fill="url(#goldGrad)"/>
      <circle cx="24" cy="0" r="6" fill="url(#cyanGrad)" filter="url(#softGlow)"/>
    </g>
    
    <!-- Digital/AI accent lines -->
    <g stroke="url(#cyanGrad)" stroke-width="1.5" opacity="0.6">
      <line x1="-100" y1="-80" x2="-70" y2="-80"/>
      <line x1="-100" y1="-60" x2="-80" y2="-60"/>
      <line x1="70" y1="-20" x2="100" y2="-20"/>
      <line x1="70" y1="0" x2="90" y2="0"/>
    </g>
    
    <!-- Dot accents -->
    <circle cx="-110" cy="-70" r="3" fill="url(#cyanGrad)" filter="url(#softGlow)"/>
    <circle cx="110" cy="-10" r="3" fill="url(#goldGrad)" filter="url(#softGlow)"/>
    <circle cx="-110" cy="60" r="2" fill="url(#violetGrad)" opacity="0.6"/>
    <circle cx="110" cy="80" r="2" fill="url(#cyanGrad)" opacity="0.6"/>
    
  </g>
  
  <!-- Brand Name -->
  <g transform="translate(256, 420)" text-anchor="middle">
    <text x="0" y="0" font-family="'Syne', 'Montserrat', sans-serif" font-size="48" font-weight="800" fill="#f4f6fa" letter-spacing="8">E-IMMO</text>
    <text x="0" y="35" font-family="'DM Sans', sans-serif" font-size="18" font-weight="400" fill="#c9a84c" letter-spacing="12">BY ELECTRON</text>
  </g>
  
  <!-- Tagline -->
  <text x="256" y="475" font-family="'DM Sans', sans-serif" font-size="12" fill="#8899bb" letter-spacing="4" text-anchor="middle" text-transform="uppercase">Premium Real Estate Platform</text>
  
</svg>