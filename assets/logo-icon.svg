<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00a8cc"/>
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c96e"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d7aff"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Main Symbol -->
  <g filter="url(#glow)" transform="translate(256, 230)">
    
    <!-- Hexagon -->
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" 
             fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" opacity="0.7"/>
    
    <!-- E letter -->
    <g transform="translate(-55, -70)">
      <rect x="0" y="0" width="14" height="120" rx="3" fill="url(#cyanGrad)"/>
      <rect x="14" y="0" width="65" height="14" rx="3" fill="url(#cyanGrad)"/>
      <rect x="14" y="36" width="52" height="10" rx="2" fill="url(#cyanGrad)"/>
      <rect x="14" y="72" width="65" height="14" rx="3" fill="url(#cyanGrad)"/>
      <rect x="14" y="105" width="45" height="10" rx="2" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Building -->
    <g transform="translate(20, -50)">
      <rect x="0" y="30" width="45" height="70" rx="3" fill="url(#violetGrad)" opacity="0.9"/>
      <rect x="7" y="40" width="10" height="10" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="24" y="40" width="10" height="10" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="7" y="58" width="10" height="10" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="24" y="58" width="10" height="10" rx="2" fill="#050d1a" opacity="0.5"/>
      <rect x="7" y="76" width="10" height="10" rx="2" fill="#00d4ff" opacity="0.3"/>
      <rect x="24" y="76" width="10" height="10" rx="2" fill="#00d4ff" opacity="0.3"/>
      <rect x="18" y="0" width="6" height="35" rx="2" fill="url(#goldGrad)"/>
      <circle cx="21" cy="0" r="5" fill="url(#cyanGrad)"/>
    </g>
    
  </g>
  
  <!-- Text -->
  <text x="256" y="380" font-family="'Syne', sans-serif" font-size="52" font-weight="800" fill="#f4f6fa" letter-spacing="6" text-anchor="middle">E-IMMO</text>
  <text x="256" y="410" font-family="'DM Sans', sans-serif" font-size="16" font-weight="400" fill="#c9a84c" letter-spacing="8" text-anchor="middle">ELECTRON</text>
  
</svg>